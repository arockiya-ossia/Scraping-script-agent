# Egress policy for sandboxed scraper containers (CLAUDE.md §8).
# Data, not code: change this file to change the policy, no rebuild of
# sandbox.py or the scraper image needed.

http_port 3128

# --- Deny list (checked first, deny wins) ---
acl cloud_metadata dst 169.254.169.254/32
acl rfc1918_10     dst 10.0.0.0/8
acl rfc1918_172    dst 172.16.0.0/12
acl rfc1918_192    dst 192.168.0.0/16
acl loopback       dst 127.0.0.0/8
acl link_local     dst 169.254.0.0/16

http_access deny cloud_metadata
http_access deny rfc1918_10
http_access deny rfc1918_172
http_access deny rfc1918_192
http_access deny loopback
http_access deny link_local

# --- Allow: everything else (public web) ---
acl all_dst dst 0.0.0.0/0
http_access allow all_dst
http_access deny all

# Standard CONNECT (HTTPS) port safety
acl CONNECT method CONNECT
acl SSL_ports port 443
http_access deny CONNECT !SSL_ports

# Sandbox containers only send requests here — no client auth needed since
# the network itself (sandbox_net, internal-only) already restricts who can
# reach this proxy.
cache deny all
access_log stdio:/var/log/squid/access.log
